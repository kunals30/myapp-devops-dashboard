name: .NET CI + SonarCloud + Docker ACR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: myapp-api
  REGISTRY: ${{ secrets.AZURE_REGISTRY }}
  VERSION: 1.0.${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Checkout
    - name: Checkout code
      uses: actions/checkout@v4

    # 🔹 Setup .NET 8
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # 🔹 Install SonarScanner
    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    # 🔹 Install ReportGenerator
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Add .NET tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    # 🔹 Begin SonarCloud Analysis
    - name: Begin SonarCloud Analysis
      run: |
        dotnet sonarscanner begin \
          /k:"kunals30_myapp-devops-dashboard" \
          /o:"kunals30" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="**/coverage.cobertura.xml"

    # 🔹 Restore
    - name: Restore
      run: dotnet restore MyApp.sln

    # 🔹 Build
    - name: Build
      run: dotnet build MyApp.sln --no-restore --configuration Release

    # 🔹 Run Tests with Coverage
    - name: Test with Coverage
      run: |
        dotnet test MyApp.Tests/MyApp.Tests.csproj \
          --configuration Release \
          --no-build \
          --collect:"XPlat Code Coverage"

    # 🔹 Generate HTML Coverage Report
    - name: Generate Coverage Report
      run: |
        reportgenerator \
          -reports:**/coverage.cobertura.xml \
          -targetdir:coverage/report \
          -reporttypes:Html

    # 🔹 End SonarCloud Analysis
    - name: End SonarCloud Analysis
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    # 🔹 Login to Azure Container Registry
    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_USERNAME }}
        password: ${{ secrets.AZURE_PASSWORD }}

    # 🔹 Build Docker Image (Versioned)
    - name: Build Docker Image
      run: |
        docker build \
          -t $REGISTRY/$IMAGE_NAME:$VERSION \
          -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} \
          .

    # 🔹 Push Docker Images
    - name: Push Docker Images
      run: |
        docker push $REGISTRY/$IMAGE_NAME:$VERSION
        docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}

# 🔹 Azure Login
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 🔹 Set AKS Context
    - name: Set AKS Context
      uses: azure/aks-set-context@v3
      with:
        resource-group: rg-myapp-dev
        cluster-name: kunals30-aks

    # 🔹 Replace Image in Deployment File
    - name: Replace image tag
      run: |
        IMAGE=$REGISTRY/$IMAGE_NAME:$VERSION
        sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yaml

    # 🔹 Deploy to AKS
    - name: Deploy to AKS
      run: |
        kubectl apply -f k8s/deployment.yaml


    # 🔹 Upload Coverage Report Artifact
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/report
